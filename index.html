<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>This is button</h1>
    <button onclick="createNewWindow()">Open Google</button>
<button onclick="closeNewWindow()">Close Google</button>
<button onclick="createNewWindow()">Open facebook</button>
<button onclick="closeNewWindow()">Close facebook</button>



<script>
let myWindow;

function createNewWindow() {
    // Syntax: window.open(URL, WindowName, Specs)
    myWindow = window.open("https://google.com", "_blank", "width=500,height=500");
    myWindow = window.open("https://facebook.com", "_blank", "width=500,height=500");
}

function closeNewWindow() {
    if (myWindow) {
        myWindow.close(); // Closes the newly created window
    }
}
</script>

</body>
</html>
